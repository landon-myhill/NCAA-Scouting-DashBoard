<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NCAA Draft Scout{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Nav -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">NCAA Draft Scout</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'scouting' %}active{% endif %}" href="/scouting">Scouting</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'compare' %}active{% endif %}" href="/compare">Compare</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'bigboard' %}active{% endif %}" href="/bigboard">Big Board</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'watchlist' %}active{% endif %}" href="/watchlist">Watchlist</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'scarcity' %}active{% endif %}" href="/scarcity">Scarcity</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'needs' %}active{% endif %}" href="/needs">Team Needs</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Prominent search bar -->
    <div class="search-bar-wrap">
        <div class="container-fluid">
            <form action="/scouting" method="GET" id="searchForm" class="position-relative">
                <div class="input-group">
                    <span class="input-group-text search-icon">🔍</span>
                    <input class="form-control search-input" type="search" id="playerSearch"
                           placeholder="Search any player by name, school, or conference..."
                           autocomplete="off">
                    <input type="hidden" name="player_id" id="searchPlayerId">
                </div>
                <div id="searchDropdown" class="search-dropdown"></div>
            </form>
        </div>
    </div>

    <div class="container-fluid py-3">
        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
